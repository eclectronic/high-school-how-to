services:
  postgres:
    image: postgres:16-alpine
    container_name: db-highschoolhowto
    restart: unless-stopped
    environment:
      POSTGRES_DB: highschoolhowto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d highschoolhowto"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: highschoolhowto/api:local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - $HOME/docker.env
    environment:
      NOTIFICATIONS_TEST_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/highschoolhowto
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: highschoolhowto/frontend:local
    depends_on:
      api:
        condition: service_started
    ports:
      - "4200:80"

volumes:
  pgdata:
