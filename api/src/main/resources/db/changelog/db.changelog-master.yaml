databaseChangeLog:
  - changeSet:
      id: 0001-auth-schema
      author: codex
      changes:
        - createTable:
            tableName: app_users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(320)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: grade_level
                  type: VARCHAR(50)
              - column:
                  name: bio
                  type: TEXT
              - column:
                  name: interests
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: email_verified_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: app_users
            columnNames: email
            constraintName: uq_app_users_email
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: app_users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: refresh_tokens
            columnNames: token
            constraintName: uq_refresh_tokens_token
        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user
            columns:
              - column:
                  name: user_id
        - createTable:
            tableName: email_verification_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: consumed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: email_verification_tokens
            baseColumnNames: user_id
            referencedTableName: app_users
            referencedColumnNames: id
            constraintName: fk_email_verification_tokens_user
            onDelete: CASCADE
        - createIndex:
            tableName: email_verification_tokens
            indexName: idx_email_verification_tokens_user
            columns:
              - column:
                  name: user_id
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: consumed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            referencedTableName: app_users
            referencedColumnNames: id
            constraintName: fk_password_reset_tokens_user
            onDelete: CASCADE
        - createIndex:
            tableName: password_reset_tokens
            indexName: idx_password_reset_tokens_user
            columns:
              - column:
                  name: user_id
        - createTable:
            tableName: audit_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
              - column:
                  name: email
                  type: VARCHAR(320)
              - column:
                  name: metadata
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: audit_events
            baseColumnNames: user_id
            referencedTableName: app_users
            referencedColumnNames: id
            constraintName: fk_audit_events_user
            onDelete: SET NULL
        - createIndex:
            tableName: audit_events
            indexName: idx_audit_events_type
            columns:
              - column:
                  name: event_type
