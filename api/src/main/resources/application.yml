auth:
  google:
    client-id: 433634062683-ltug32flo9g2njc0h654u4b3hori8fkr.apps.googleusercontent.com
  jwt:
    issuer: highschoolhowto-api
    access-token-ttl: PT1H
    remember-me-refresh-ttl: P60D
    verification-token-ttl: PT24H
    reset-token-ttl: PT15M
    private-key-path: classpath:keys/dev-private.pem
    public-key-path: classpath:keys/dev-public.pem
  links:
    verification: https://highschoolhowto.com/api/auth/verify-email
    verification-redirect: https://highschoolhowto.com/auth/login
    reset: https://highschoolhowto.com/auth/reset-password

management:
  endpoints:
    web:
      exposure:
        include: health,info
        
notifications:
  ses:
    enabled: false
    region: us-west-2
    from-address: admin@highschoolhowto.com

server:
  port: 8080

spring:
  application:
    name: highschoolhowto-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

storage:
  s3:
    bucket: ${STORAGE_S3_BUCKET:highschoolhowto-site}
    region: ${STORAGE_S3_REGION:us-west-2}
    upload-prefix: uploads/
    cdn-base-url: ${STORAGE_S3_CDN_BASE_URL:}
