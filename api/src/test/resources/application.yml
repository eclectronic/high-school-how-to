spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false

auth:
  jwt:
    issuer: highschoolhowto-api-test
    access-token-ttl: PT15M
    refresh-token-ttl: P1D
    verification-token-ttl: PT1H
    reset-token-ttl: PT30M
    private-key-path: classpath:keys/dev-private.pem
    public-key-path: classpath:keys/dev-public.pem
  links:
    verification: http://localhost:8080/api/auth/verify-email
    reset: http://localhost:4200/reset-password
