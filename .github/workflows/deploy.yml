# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-api:
    name: Deploy API (ECR + App Runner)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Build image, push to ECR, deploy to App Runner
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: us-west-2
          AWS_ECR_REPO_NAME: highschoolhowto/api
          AWS_IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: highschoolhowto-api
        run: ./api/scripts/deploy.sh

      - name: Wait for App Runner deployment to complete
        env:
          SERVICE_ARN: arn:aws:apprunner:us-west-2:${{ secrets.AWS_ACCOUNT_ID }}:service/highschoolhowto-api/94935f8663744265926241dce6252d76
        run: |
          echo "Waiting for App Runner service to reach RUNNING status..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --region us-west-2 \
              --query "Service.Status" \
              --output text)
            echo "  attempt $i: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "App Runner deployment complete."
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: App Runner did not reach RUNNING status within 10 minutes." >&2
          exit 1

  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    needs: deploy-api
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Build and deploy to S3 + invalidate CloudFront
        env:
          AWS_REGION: us-west-2
          CLOUDFRONT_DISTRIBUTION_ID: E1S3AKUQUXDIGC
        run: ./scripts/deploy-prod.sh
