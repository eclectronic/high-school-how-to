<div class="admin-page">
  <div class="admin-page__header">
    <h1>Tags</h1>
    <button class="btn btn--primary" (click)="openNew()">+ New Tag</button>
  </div>

  @if (error()) {
    <div class="admin-error">{{ error() }}</div>
  }

  @if (showForm()) {
    <div class="admin-card form-card">
      <h2>{{ editingTag() ? 'Edit Tag' : 'New Tag' }}</h2>
      <div class="form-row">
        <label>Name</label>
        <input [(ngModel)]="form.name" (input)="onNameInput()" placeholder="Driver's License" />
      </div>
      <div class="form-row">
        <label>Slug</label>
        <input [(ngModel)]="form.slug" placeholder="drivers-license" />
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea [(ngModel)]="form.description" rows="2" placeholder="Optional description"></textarea>
      </div>
      <div class="form-row">
        <label>Sort Order</label>
        <input type="number" [(ngModel)]="form.sortOrder" />
      </div>
      <div class="form-actions">
        <button class="btn btn--secondary" (click)="cancel()">Cancel</button>
        <button class="btn btn--primary" (click)="save()">Save</button>
      </div>
    </div>
  }

  @if (loading()) {
    <p>Loading...</p>
  } @else {
    <div class="tag-list">
      @for (tag of tags(); track tag.id) {
        <div class="admin-card tag-card">
          <div class="tag-card__info">
            <strong>{{ tag.name }}</strong>
            <code>{{ tag.slug }}</code>
            @if (tag.description) {
              <p>{{ tag.description }}</p>
            }
          </div>
          <div class="tag-card__actions">
            <button class="btn btn--secondary btn--sm" (click)="openEdit(tag)">Edit</button>
            <button class="btn btn--danger btn--sm" (click)="delete(tag)">Delete</button>
          </div>
        </div>
      }
    </div>
  }
</div>
