<nav class="site-nav" aria-label="Site navigation">
  <a routerLink="/" class="site-nav__logo" aria-label="High School How To — Home">
    High School How To
  </a>

  <ul class="site-nav__links" role="list">
    <li>
      <a routerLink="/how-to"
         class="site-nav__link"
         [class.site-nav__link--active]="activeRoute === 'how-to'">
        How To
      </a>
    </li>
    <li>
      <a routerLink="/about"
         class="site-nav__link"
         [class.site-nav__link--active]="activeRoute === 'about'">
        About
      </a>
    </li>
    <li>
      <a routerLink="/help"
         class="site-nav__link"
         [class.site-nav__link--active]="activeRoute === 'help'">
        Help
      </a>
    </li>
  </ul>

  <div class="site-nav__cta">
    @if (isAuthenticated()) {
      <a routerLink="/locker" class="site-nav__cta-btn site-nav__cta-btn--primary">My Locker</a>
      <a routerLink="/account/profile" class="site-nav__avatar-btn" [class.site-nav__avatar-btn--active]="activeRoute === 'account'" [title]="firstName() || 'Account'">
        @if (avatarUrl()) {
          <img [src]="avatarUrl()!" class="site-nav__avatar-img" alt="Profile" referrerpolicy="no-referrer" />
        } @else {
          <svg class="site-nav__avatar-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        }
      </a>
      <button class="site-nav__cta-btn site-nav__cta-btn--logout" (click)="logout()">Log Out</button>
    } @else {
      <a routerLink="/auth/login" class="site-nav__cta-btn site-nav__cta-btn--primary">Log In</a>
    }
    @if (isAdmin()) {
      <a routerLink="/admin" class="site-nav__cta-btn site-nav__cta-btn--admin">Admin</a>
    }
  </div>
</nav>
