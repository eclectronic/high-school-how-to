<header
  class="pane-header"
  [style.color]="textColor"
>
  <div class="pane-header__left">
    <span class="pane-header__icon">{{ appDef.icon }}</span>
    <span class="pane-header__title">{{ appDef.label }}{{ subtitle ? ': ' + subtitle : '' }}</span>
  </div>

  <div class="pane-header__actions">
    <!-- Info tooltip -->
    <div class="pane-header__info-wrap">
      <button
        type="button"
        class="pane-header__icon-btn"
        [style.color]="textColor"
        aria-label="App help"
        (click)="toggleTooltip($event); $event.stopPropagation()"
      >ℹ</button>

      @if (showTooltip() && tooltipPos()) {
        <div
          class="pane-header__tooltip"
          [style.top]="tooltipPos()!.top"
          [style.left]="tooltipPos()!.left"
          (click)="$event.stopPropagation()"
        >
          <p>{{ appDef.helpText }}</p>
          <button type="button" class="pane-header__tooltip-close" (click)="hideTooltip()">✕</button>
        </div>
      }
    </div>

    <!-- Per-app color dot -->
    @if (appColor) {
      <button
        type="button"
        class="pane-header__color-btn"
        [style.background]="appColor"
        title="Change color"
        aria-label="Change app color"
        (click)="colorPickerRequest.emit(); $event.stopPropagation()"
      ></button>
    }

    <!-- Close button -->
    @if (showWindowButtons) {
      <div class="titlebar-btns" (click)="$event.stopPropagation()">
        <button
          type="button"
          class="titlebar-btn titlebar-btn--close"
          aria-label="Close"
          title="Close"
          [disabled]="!canClose"
          (click)="close.emit()"
        >&#x2715;</button>
      </div>
    }
  </div>
</header>
