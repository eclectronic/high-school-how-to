<div class="about-page">
  <app-site-nav activeRoute="about" />

  <main class="about-page__main">
    @if (loading()) {
      <div class="about-page__loading" aria-live="polite">Loading…</div>
    } @else {
      <article class="about-page__article">
        <h1 class="about-page__title">{{ title() }}</h1>
        @if (bodyHtml()) {
          <div class="about-page__body" [innerHTML]="bodyHtml()"></div>
        } @else {
          <p class="about-page__empty">No content available.</p>
        }
      </article>
    }
  </main>
</div>
