<section class="auth-form">
  <ng-container *ngIf="!sent(); else confirmation">
    <h2>Forgot password</h2>
    <p class="auth-form__intro">Enter your email and we’ll send a reset link (check spam too).</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="form-field">
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          [class.form-field__input--invalid]="form.controls.email.invalid && form.controls.email.touched"
        />
        <small *ngIf="form.controls.email.invalid && form.controls.email.touched">Enter a valid email.</small>
      </label>

      <button type="submit" class="auth-button" [disabled]="loading()">
        {{ loading() ? 'Sending reset link…' : 'Send reset link' }}
      </button>
    </form>
  </ng-container>

  <ng-template #confirmation>
    <div class="auth-alert auth-alert--success" role="status">
      If that email is registered we just sent instructions with a link that expires in 15 minutes.
    </div>
    <div class="auth-form__links">
      <a routerLink="/auth/login">Return to login</a>
    </div>
  </ng-template>
</section>
