<section class="auth-form">
  <h2>Log in</h2>

  <div *ngIf="info()" class="auth-alert auth-alert--success" role="status">
    {{ info() }}
  </div>

  <div *ngIf="error()" class="auth-alert auth-alert--error" role="status">
    {{ error() }}
  </div>

  <div class="auth-form__google">
    <app-google-button [nonce]="nonce" (idTokenReceived)="onGoogleIdToken($event)" />
  </div>

  <div class="auth-form__divider">
    <span>or</span>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label class="form-field">
      <span>Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        required
        [class.form-field__input--invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
      <small *ngIf="form.controls.email.invalid && form.controls.email.touched">Enter a valid email.</small>
    </label>

    <label class="form-field">
      <span>Password</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="current-password"
        required
        [class.form-field__input--invalid]="form.controls.password.invalid && form.controls.password.touched"
      />
      <small *ngIf="form.controls.password.invalid && form.controls.password.touched">
        Password is required.
      </small>
    </label>

    <label class="form-field form-field--checkbox">
      <input type="checkbox" formControlName="rememberMe" />
      <span>Remember me on this device</span>
    </label>

    <button type="submit" class="auth-button" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Log in' }}
    </button>
  </form>

  <div class="auth-form__links">
    <a routerLink="/auth/forgot-password">Forgot password?</a>
    <a routerLink="/auth/signup">Need an account? Sign up</a>
  </div>
</section>
