<section class="auth-form">
  <ng-container *ngIf="!complete(); else successState">
    <h2>Reset password</h2>
    <p class="auth-form__intro">Choose a new password that meets the security checklist.</p>

    <div *ngIf="error()" class="auth-alert auth-alert--error" role="status">
      {{ error() }}
    </div>

    <ng-container *ngIf="token(); else missingToken">
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <label class="form-field">
          <span>New password</span>
          <input
            type="password"
            formControlName="newPassword"
            autocomplete="new-password"
            required
            [class.form-field__input--invalid]="form.controls.newPassword.invalid && form.controls.newPassword.touched"
          />
          <small>At least 12 characters with upper/lowercase, number, and symbol.</small>
        </label>

        <label class="form-field">
          <span>Confirm new password</span>
          <input
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            required
            [class.form-field__input--invalid]="passwordsDoNotMatch()"
          />
          <small *ngIf="passwordsDoNotMatch()">Passwords must match.</small>
        </label>

        <button type="submit" class="auth-button" [disabled]="loading()">
          {{ loading() ? 'Updating password…' : 'Update password' }}
        </button>
      </form>
    </ng-container>
  </ng-container>

  <ng-template #missingToken>
    <div class="auth-alert auth-alert--error" role="status">
      We couldn’t find a reset token. Please start over from the forgot password page.
    </div>
    <div class="auth-form__links">
      <a routerLink="/auth/forgot-password">Go to forgot password</a>
    </div>
  </ng-template>

  <ng-template #successState>
    <div class="auth-alert auth-alert--success" role="status">
      Password updated! Sign in with your new password to continue.
    </div>
    <div class="auth-form__links">
      <a routerLink="/auth/login">Back to login</a>
    </div>
  </ng-template>
</section>
