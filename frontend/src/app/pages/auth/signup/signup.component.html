<section class="auth-form">
  <ng-container *ngIf="!complete(); else successState">
    <h2>Sign up</h2>
    <p class="auth-form__intro">Create your account to unlock personalized study plans.</p>

    <div *ngIf="error()" class="auth-alert auth-alert--error" role="status">
      {{ error() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="form-field">
        <span>First name</span>
        <input
          type="text"
          formControlName="firstName"
          autocomplete="given-name"
          required
          [class.form-field__input--invalid]="form.controls.firstName.invalid && form.controls.firstName.touched"
        />
        <small *ngIf="form.controls.firstName.invalid && form.controls.firstName.touched">
          First name is required.
        </small>
      </label>

      <label class="form-field">
        <span>Last name</span>
        <input
          type="text"
          formControlName="lastName"
          autocomplete="family-name"
          required
          [class.form-field__input--invalid]="form.controls.lastName.invalid && form.controls.lastName.touched"
        />
        <small *ngIf="form.controls.lastName.invalid && form.controls.lastName.touched">
          Last name is required.
        </small>
      </label>

      <label class="form-field">
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          [class.form-field__input--invalid]="form.controls.email.invalid && form.controls.email.touched"
        />
        <small *ngIf="form.controls.email.invalid && form.controls.email.touched">Enter a valid email.</small>
      </label>

      <label class="form-field">
        <span>Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
          required
          [class.form-field__input--invalid]="form.controls.password.invalid && form.controls.password.touched"
        />
        <small>Minimum 12 characters, include upper/lowercase, a number, and a symbol.</small>
      </label>

      <button type="submit" class="auth-button" [disabled]="loading()">
        {{ loading() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <div class="auth-form__links">
      <span></span>
      <a routerLink="/auth/login">Already have an account? Log in</a>
    </div>
  </ng-container>

  <ng-template #successState>
    <div class="auth-alert auth-alert--success" role="status">
      Account submitted! Check your inbox for a verification link. Once you confirm, you can log in.
    </div>
    <div class="auth-form__links">
      <a routerLink="/auth/login">Go to login</a>
    </div>
  </ng-template>
</section>
