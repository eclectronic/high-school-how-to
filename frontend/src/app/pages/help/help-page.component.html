<div class="help-page">
  <app-site-nav activeRoute="help" />

  <header class="help-page__header">
    <h1 class="help-page__title">We're here to help</h1>
  </header>

  <main class="help-page__main">
    @if (loading()) {
      <div class="help-page__loading" aria-live="polite">Loading…</div>
    } @else if (articles().length === 0) {
      <p class="help-page__empty">No help articles found.</p>
    } @else {
      <div class="postit-grid">
        @for (article of articles(); track article.id; let i = $index) {
          <a
            class="postit"
            [routerLink]="['/content', article.slug]"
            [style.background-color]="cardColor(i, article)"
            [style.transform]="'rotate(' + cardRotation(i) + 'deg)'"
          >
            <span class="postit__pin" [style.background]="pinBackground(i)"></span>
            <span class="postit__title">{{ article.title }}</span>
            @if (article.description) {
              <span class="postit__desc">{{ article.description }}</span>
            }
          </a>
        }
      </div>
    }
  </main>
</div>
